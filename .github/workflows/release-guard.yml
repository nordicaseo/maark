name: Release Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release guard checks
        run: npm run ci:release-guard

  convex-public-functions:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Convex codegen
        run: npm run convex:codegen

      - name: Verify Convex public functions
        if: env.CONVEX_DEPLOY_KEY != ''
        run: npm run convex:verify-public

      - name: Skip remote Convex verification
        if: env.CONVEX_DEPLOY_KEY == ''
        run: echo "CONVEX_DEPLOY_KEY not set. Skipping remote Convex public-function verification."
