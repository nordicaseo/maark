name: Release Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed Vercel project metadata
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<'JSON'
          {"projectId":"prj_6JDgeFGHSTs42AjlaXOOXkLNquy4","orgId":"team_12ttcviDMRgJSWVEGXTcFfjp","projectName":"maark"}
          JSON

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release guard checks
        run: npm run ci:release-guard

  vercel-production-alias:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_CANONICAL_ALIAS: maark-nordicaseo.vercel.app
      VERCEL_PROJECT_PRODUCTION_URL: maark-nordicaseo.vercel.app
      VERCEL_REQUIRED_DOMAINS: maark.ai,www.maark.ai
      EXPECTED_VERCEL_PROJECT_NAME: maark
      EXPECTED_VERCEL_PROJECT_ID: prj_6JDgeFGHSTs42AjlaXOOXkLNquy4
      EXPECTED_VERCEL_ORG_ID: team_12ttcviDMRgJSWVEGXTcFfjp
      EXPECTED_VERCEL_CONTEXT_NAME: nordicaseo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed Vercel project metadata
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<'JSON'
          {"projectId":"prj_6JDgeFGHSTs42AjlaXOOXkLNquy4","orgId":"team_12ttcviDMRgJSWVEGXTcFfjp","projectName":"maark"}
          JSON

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is required for production alias guard verification." >&2
            exit 1
          fi

      - name: Verify project guardrails
        run: npm run guard:project

      - name: Verify production aliases
        run: npm run guard:vercel-production

  convex-public-functions:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Convex codegen + public-function verification
        if: env.CONVEX_DEPLOY_KEY != ''
        run: npm run ci:convex-guard

      - name: Skip remote Convex verification
        if: env.CONVEX_DEPLOY_KEY == ''
        run: echo "CONVEX_DEPLOY_KEY not set. Skipping Convex codegen and remote public-function verification."
